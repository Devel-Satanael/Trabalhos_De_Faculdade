<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 1</title>
</head>
<body>
    <h2>Preencha a Matriz 3x3</h2>
    <textarea id="texto" placeholder="Digite os numeros da matriz..."></textarea>
    <button onclick="monteMatriz()">Resultado</button>
    
    <script>
        function monteMatriz(){
            
            const input = document.getElementById("texto").value
            const numeros = input.split(/[\s,]+/).map(Number);

            let todos = "";
            let maior = -9999;
            let menor = 9999;
            let contador = 0;

            for (let i = 0; i < 3; i++){
                for (let j = 0; j < 3; j++){
                    
                    let num = numeros[contador];
                    todos += "[" + num + "]";

                    if (num < menor ){
                        menor = num;
                    }
                    if (num > maior)
                        maior = num;
                    contador ++;
                }
                todos += "\n"; 
            }
            
          
            alert(
                "a) Matriz Digitada:\n" + todos + "\n" +
                "b) Maior número: " + maior + "\n" +
                "c) Menor número: " + menor
            );
        }
    </script>
</body>
</html>
